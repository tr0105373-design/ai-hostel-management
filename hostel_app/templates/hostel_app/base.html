<!DOCTYPE html>
<html lang="en">
<head>
    <title>Hostel Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0f1b2d;
            --teal: #00c9a7;
            --teal-dark: #00a68a;
            --gold: #f5c518;
            --light: #f0f4f8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--light);
            min-height: 100vh;
        }

        .navbar {
            background: var(--navy);
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--teal);
        }

        .navbar a {
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 8px 14px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .navbar a:hover {
            background: rgba(0,201,167,0.15);
            color: var(--teal);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 30px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 28px 20px 22px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(15,27,45,0.08);
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.25s, box-shadow 0.25s;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--teal), var(--gold));
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(15,27,45,0.14);
        }

        .btn {
            display: inline-block;
            padding: 9px 22px;
            background: var(--teal);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: var(--teal-dark);
        }

        .footer {
            text-align: center;
            padding: 24px;
            color: #6b7f96;
            font-size: 0.8rem;
            border-top: 1px solid rgba(0,0,0,0.07);
            margin-top: 20px;
        }

        /* Form Global Styles */
        input[type="text"],
        input[type="email"],
        input[type="number"],
        input[type="tel"],
        input[type="password"],
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e8f0;
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            color: #0f1b2d;
            outline: none;
            box-sizing: border-box;
            margin-top: 6px;
            background: white;
            display: block;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="number"]:focus,
        input[type="tel"]:focus,
        select:focus,
        textarea:focus {
            border-color: #00c9a7;
        }

        label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #6b7f96;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            margin-top: 12px;
        }

        form p {
            margin-bottom: 16px;
        }

    </style>
</head>

<body>

<nav class="navbar">
    <div class="navbar-brand">🏠 AI Hostel</div>
    <div>
        <a href="/">Home</a>
        <a href="/dashboard/">Dashboard</a>
        <a href="/add-student/">Add Student</a>
        <a href="/students/">Students</a>
        <a href="/complaint/">Complaint</a>
        <a href="/fees/">Fees</a>
        <a href="/rooms/">Rooms</a>
        <a href="/visitor/">Visitor</a>
    </div>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

<div class="footer">© 2026 AI Hostel Management System</div>

</body>
</html>
