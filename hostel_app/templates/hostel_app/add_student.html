{% extends 'hostel_app/base.html' %}

{% block content %}

<!-- Page Header -->
<div style="
    background: linear-gradient(135deg, #1e3a8a 0%, #1a56db 100%);
    border-radius: 16px;
    padding: 35px 40px;
    margin-bottom: 30px;
">
    <h2 style="font-family:'Fraunces',serif; color:white; font-size:1.8rem; margin-bottom:6px;">➕ Add Student</h2>
    <p style="color:rgba(255,255,255,0.55); font-size:0.9rem;">Register new student</p>
</div>

<!-- Form Card -->
<div style="
    background:white;
    border-radius:16px;
    padding:35px;
    box-shadow:0 2px 16px rgba(26,86,219,0.08);
    max-width:600px;
">
    <form method="POST">
        {% csrf_token %}

        <div style="margin-bottom:20px;">
            {{ form.as_p }}
        </div>

        <button type="submit" style="
            padding:13px 35px;
            background:#1a56db;
            color:white;
            border:none;
            border-radius:10px;
            font-size:0.95rem;
            font-weight:600;
            cursor:pointer;
            font-family:'Outfit',sans-serif;
            transition: background 0.2s;
        "
        onmouseover="this.style.background='#1e3a8a'"
        onmouseout="this.style.background='#1a56db'">
            💾 Save Student
        </button>

    </form>
</div>

<style>
    form p {
        margin-bottom: 16px;
    }
    form p label {
        display: block;
        font-size: 0.82rem;
        font-weight: 600;
        color: #4b6cb7;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 8px;
        font-family: 'Outfit', sans-serif;
    }
    form p input,
    form p select,
    form p textarea {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #bfdbfe;
        border-radius: 10px;
        font-size: 0.9rem;
        font-family: 'Outfit', sans-serif;
        color: #1e3a5f;
        outline: none;
        box-sizing: border-box;
        transition: border-color 0.2s;
    }
    form p input:focus,
    form p select:focus,
    form p textarea:focus {
        border-color: #1a56db;
    }
</style>

{% endblock %}
