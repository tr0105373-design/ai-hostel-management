<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hostel — Student Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            display: flex;
            min-height: 100vh;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 230px;
            background: #1e4d2b;
            min-height: 100vh;
            position: fixed;
            top: 0; left: 0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-logo {
            padding: 20px 18px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #2d6b3e;
        }

        .logo-icon {
            width: 36px; height: 36px;
            background: #f0a500;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }

        .logo-text h3 {
            color: white;
            font-size: 15px;
            font-weight: 700;
        }

        .logo-text span {
            color: #8fbc9b;
            font-size: 11px;
        }

        .nav-section-label {
            color: #8fbc9b;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            padding: 16px 18px 6px;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 18px;
            color: #c8dece;
            text-decoration: none;
            font-size: 13.5px;
            border-left: 3px solid transparent;
            transition: all 0.15s;
        }

        .sidebar-nav a:hover {
            background: #2d6b3e;
            color: white;
        }

        .sidebar-nav a.active {
            background: #2d6b3e;
            color: white;
            border-left: 3px solid #f0a500;
        }

        .sidebar-nav a .nav-icon { font-size: 15px; }

        .sidebar-user {
            margin-top: auto;
            padding: 14px 18px;
            border-top: 1px solid #2d6b3e;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 34px; height: 34px;
            background: #f0a500;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
        }

        .user-info p {
            color: white;
            font-size: 13px;
            font-weight: 600;
        }

        .user-info span {
            color: #8fbc9b;
            font-size: 11px;
        }

        .signout-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            color: #ff8a80;
            text-decoration: none;
            font-size: 13px;
            border-top: 1px solid #2d6b3e;
        }

        .signout-link:hover { background: #2d6b3e; }

        /* ── MAIN CONTENT ── */
        .main {
            margin-left: 230px;
            flex: 1;
            padding: 0;
        }

        .topbar {
            background: white;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e8ede9;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .topbar-left h2 {
            font-size: 15px;
            color: #1e4d2b;
            font-weight: 600;
        }

        .clock {
            background: #f5f5f5;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12.5px;
            color: #555;
        }

        .content { padding: 26px 28px; }

        /* ── STAT CARDS ── */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-bottom: 22px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 18px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
            border-top: 3px solid #1e4d2b;
        }

        .stat-card.orange { border-top-color: #f0a500; }
        .stat-card.blue   { border-top-color: #3b82f6; }
        .stat-card.red    { border-top-color: #ef4444; }

        .stat-card .card-icon { font-size: 24px; margin-bottom: 10px; }
        .stat-card h3 { font-size: 26px; color: #111; font-weight: 700; }
        .stat-card p  { font-size: 11.5px; color: #888; margin-top: 3px; }

        /* ── SECTION BOX ── */
        .section-box {
            background: white;
            border-radius: 12px;
            padding: 22px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }

        .section-box h3 {
            font-size: 14px;
            color: #1e4d2b;
            font-weight: 600;
            margin-bottom: 16px;
        }

        /* ── TABLE ── */
        table { width: 100%; border-collapse: collapse; }

        th {
            background: #f4f8f5;
            color: #1e4d2b;
            padding: 9px 13px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
        }

        td {
            padding: 10px 13px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
            color: #333;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafcfa; }

        /* ── BADGES ── */
        .badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-pending  { background: #fff8e1; color: #b45309; }
        .badge-paid     { background: #dcfce7; color: #166534; }
        .badge-resolved { background: #dcfce7; color: #166534; }
        .badge-high     { background: #fee2e2; color: #991b1b; }
        .badge-medium   { background: #fff8e1; color: #b45309; }
        .badge-low      { background: #dcfce7; color: #166534; }

        /* ── FORM ── */
        .form-group { margin-bottom: 14px; }

        .form-group label {
            display: block;
            font-size: 12.5px;
            color: #444;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 9px 13px;
            border: 1px solid #dde3de;
            border-radius: 8px;
            font-size: 13.5px;
            color: #333;
            outline: none;
            background: #fafcfa;
            transition: border 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #1e4d2b;
            background: white;
        }

        .btn-primary {
            background: #1e4d2b;
            color: white;
            border: none;
            padding: 9px 22px;
            border-radius: 8px;
            font-size: 13.5px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary:hover { background: #174023; }

        /* ── ALERTS ── */
        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 14px;
        }

        .alert-success {
            background: #dcfce7;
            color: #166534;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 14px;
        }

        /* ── NOTICE ── */
        .notice-item {
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .notice-item:last-child { border-bottom: none; }
        .notice-item h4 { font-size: 13.5px; color: #1e4d2b; font-weight: 600; }
        .notice-item p  { font-size: 12.5px; color: #666; margin-top: 3px; }
        .notice-item small { font-size: 11px; color: #aaa; }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="sidebar-logo">
        <div class="logo-icon">🏠</div>
        <div class="logo-text">
            <h3>AI Hostel</h3>
            <span>Student Portal</span>
        </div>
    </div>

    <nav class="sidebar-nav">
        <div class="nav-section-label">Main</div>
        <a href="{% url 'student_dashboard' %}"
           class="{% if request.resolver_match.url_name == 'student_dashboard' %}active{% endif %}">
            <span class="nav-icon">📊</span> Dashboard
        </a>
        <a href="{% url 'student_profile' %}"
           class="{% if request.resolver_match.url_name == 'student_profile' %}active{% endif %}">
            <span class="nav-icon">👤</span> My Profile
        </a>

        <div class="nav-section-label">Hostel</div>
        <a href="{% url 'my_room' %}"
           class="{% if request.resolver_match.url_name == 'my_room' %}active{% endif %}">
            <span class="nav-icon">🛏️</span> My Room
        </a>
        <a href="{% url 'my_fees' %}"
           class="{% if request.resolver_match.url_name == 'my_fees' %}active{% endif %}">
            <span class="nav-icon">💰</span> My Fees
        </a>

        <div class="nav-section-label">Support</div>
        <a href="{% url 'student_complaint' %}"
           class="{% if request.resolver_match.url_name == 'student_complaint' %}active{% endif %}">
            <span class="nav-icon">📝</span> Complaints
        </a>
        <a href="{% url 'visitor_request' %}"
           class="{% if request.resolver_match.url_name == 'visitor_request' %}active{% endif %}">
            <span class="nav-icon">👥</span> Visitors
        </a>
        <a href="{% url 'student_notices' %}"
           class="{% if request.resolver_match.url_name == 'student_notices' %}active{% endif %}">
            <span class="nav-icon">📢</span> Notices
        </a>
    </nav>

    <div class="sidebar-user">
        <div class="user-avatar">{{ student.name|first|upper }}</div>
        <div class="user-info">
            <p>{{ student.name }}</p>
            <span>Student</span>
        </div>
    </div>

    <a href="{% url 'student_logout' %}" class="signout-link">
        🚪 Sign Out
    </a>
</div>

<!-- Main -->
<div class="main">
    <div class="topbar">
        <div class="topbar-left">
            <span>🏠</span>
            <h2>AI Hostel Management</h2>
        </div>
        <span class="clock" id="clock"></span>
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent =
            now.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'}) +
            ' — ' +
            now.toLocaleDateString('en-IN', {weekday:'short', day:'numeric', month:'short'});
    }
    updateClock();
    setInterval(updateClock, 1000);
</script>

</body>
</html>
