<table border="1">

<tr>
<th>Student</th>
<th>Amount</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for f in fees %}

<tr>
<td>{{ f.student.name }}</td>
<td>{{ f.amount }}</td>
<td>{{ f.status }}</td>

<td>
{% if f.status == "Pending" %}
<a href="/pay_fee/{{ f.id }}/">Pay</a>
{% else %}
Paid
{% endif %}
</td>

</tr>

{% endfor %}

</table>
