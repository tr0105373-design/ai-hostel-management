{% extends 'hostel_app/base.html' %}

{% block content %}

<!-- Page Header -->
<div style="
    background: linear-gradient(135deg, #0f1b2d 0%, #1a3a5c 100%);
    border-radius: 16px;
    padding: 35px 40px;
    margin-bottom: 30px;
">
    <h2 style="font-family:'Playfair Display',serif; color:white; font-size:1.8rem; margin-bottom:6px;">✏️ Edit Student</h2>
    <p style="color:rgba(255,255,255,0.55); font-size:0.9rem;">Update student details</p>
</div>

<!-- Form Card -->
<div style="
    background:white;
    border-radius:16px;
    padding:35px;
    box-shadow:0 2px 16px rgba(15,27,45,0.08);
    max-width:600px;
">
    <form method="POST">
        {% csrf_token %}

        <div style="margin-bottom:20px;">
            {{ form.as_p }}
        </div>

        <div style="display:flex; gap:12px;">
            <button type="submit" style="
                padding:13px 35px;
                background:#00c9a7;
                color:white;
                border:none;
                border-radius:10px;
                font-size:0.95rem;
                font-weight:600;
                cursor:pointer;
                font-family:'DM Sans',sans-serif;
            "
            onmouseover="this.style.background='#00a68a'"
            onmouseout="this.style.background='#00c9a7'">
                💾 Update Student
            </button>

            <a href="/students/" style="
                padding:13px 25px;
                background:#f0f4f8;
                color:#0f1b2d;
                text-decoration:none;
                border-radius:10px;
                font-size:0.95rem;
                font-weight:600;
            ">← Cancel</a>
        </div>

    </form>
</div>

<style>
    form p {
        margin-bottom: 16px;
    }
    form p label {
        display: block;
        font-size: 0.82rem;
        font-weight: 600;
        color: #6b7f96;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 8px;
        font-family: 'DM Sans', sans-serif;
    }
    form p input,
    form p select,
    form p textarea {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e0e8f0;
        border-radius: 10px;
        font-size: 0.9rem;
        font-family: 'DM Sans', sans-serif;
        color: #0f1b2d;
        outline: none;
        box-sizing: border-box;
    }
    form p input:focus,
    form p select:focus,
    form p textarea:focus {
        border-color: #00c9a7;
    }
</style>

{% endblock %}
